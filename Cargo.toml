[package]
name = "db"
version = "0.1.0"
edition = "2024"
license = "MIT"
readme = "README.md"
repository = "https://github.com/wyattgill9/db"
authors = ["Wyatt Gill <wyattgill01@outlook.com>"]

[dependencies]
snafu        = "0.9.0"
bytemuck     = { version = "1.25", features = ["derive"] }
ahash        = "0.8.12"
more-asserts = "0.3"

[lints.rust]
warnings    = "deny"
unsafe_code = "forbid"

[lints.clippy]
all = { level = "deny", priority = -1 }
